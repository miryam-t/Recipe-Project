<div class="admin-dashboard-wrapper" dir="rtl">
  <mat-card>
    <mat-card-header>
      <mat-card-title>ניהול בקשות שדרוג</mat-card-title>
      <mat-card-subtitle>משתמשים הממתינים לאישור כמעלי מתכונים (Uploader)</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <div *ngIf="pendingUsers.length === 0" class="empty-state">
        <mat-icon>verified_user</mat-icon>
        <p>כל הבקשות טופלו. אין משתמשים ממתינים.</p>
      </div>

      <table mat-table [dataSource]="pendingUsers" class="mat-elevation-z2" *ngIf="pendingUsers.length > 0">

        <ng-container matColumnDef="username">
          <th mat-header-cell *matHeaderCellDef> שם משתמש </th>
          <td mat-cell *matCellDef="let user"> {{user.username}} </td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef> אימייל </th>
          <td mat-cell *matCellDef="let user"> {{user.email}} </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> פעולות </th>
          <td mat-cell *matCellDef="let user">
            <button mat-raised-button color="primary" (click)="approve(user.id)">
              <mat-icon>done</mat-icon> אשר שדרוג
            </button>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
